<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head -->
  <circle cx="32" cy="20" r="10" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>

  <!-- Gray hair (receding hairline) -->
  <path d="M 24 14 Q 26 11 28 12 L 28 16" fill="#B8B8B8"/>
  <path d="M 40 14 Q 38 11 36 12 L 36 16" fill="#B8B8B8"/>
  <path d="M 28 12 Q 32 10 36 12" fill="#B8B8B8"/>

  <!-- Glasses -->
  <circle cx="27" cy="19" r="3.5" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <circle cx="37" cy="19" r="3.5" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="30.5" y1="19" x2="33.5" y2="19" stroke="#2C3E50" stroke-width="1.5"/>

  <!-- Eyes behind glasses -->
  <circle cx="27" cy="19" r="1.2" fill="#2C3E50"/>
  <circle cx="37" cy="19" r="1.2" fill="#2C3E50"/>

  <!-- Mustache -->
  <path d="M 28 24 Q 30 25 32 24 Q 34 25 36 24" stroke="#B8B8B8" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Smile -->
  <path d="M 27 26 Q 32 28 37 26" stroke="#E67E22" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <rect x="28" y="28" width="8" height="4" fill="#FFD4A3"/>

  <!-- Vest over shirt -->
  <rect x="24" y="32" width="16" height="16" rx="2" fill="#8B4513" stroke="#654321" stroke-width="1.5"/>

  <!-- Shirt collar under vest -->
  <path d="M 28 32 L 30 30 L 32 32" fill="#FFFFFF" opacity="0.8"/>
  <path d="M 36 32 L 34 30 L 32 32" fill="#FFFFFF" opacity="0.8"/>

  <!-- Vest buttons -->
  <circle cx="32" cy="36" r="1.2" fill="#FFD700"/>
  <circle cx="32" cy="42" r="1.2" fill="#FFD700"/>

  <!-- Pants -->
  <rect x="24" y="48" width="7" height="10" rx="1" fill="#2C3E50" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="33" y="48" width="7" height="10" rx="1" fill="#2C3E50" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Arms -->
  <path d="M 24 34 Q 16 38 14 45" stroke="#FFD4A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M 40 34 Q 48 38 50 45" stroke="#FFD4A3" stroke-width="4" stroke-linecap="round"/>
</svg>
