<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head -->
  <circle cx="32" cy="20" r="10" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>

  <!-- Long hair -->
  <path d="M 22 18 Q 20 12 22 8 Q 27 6 32 6 Q 37 6 42 8 Q 44 12 42 18" fill="#8B4513"/>
  <path d="M 22 18 Q 18 22 18 30 L 22 30 Q 22 24 24 20" fill="#8B4513"/>
  <path d="M 42 18 Q 46 22 46 30 L 42 30 Q 42 24 40 20" fill="#8B4513"/>

  <!-- Eyes -->
  <circle cx="28" cy="19" r="1.5" fill="#2C3E50"/>
  <circle cx="36" cy="19" r="1.5" fill="#2C3E50"/>

  <!-- Smile -->
  <path d="M 27 23 Q 32 25 37 23" stroke="#E67E22" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Body (dress) -->
  <path d="M 27 30 L 20 58 L 44 58 L 37 30 Z" fill="#FF6B9D" stroke="#D63384" stroke-width="1.5"/>

  <!-- Dress pattern -->
  <circle cx="28" cy="40" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="36" cy="45" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="30" cy="50" r="2" fill="#FFFFFF" opacity="0.6"/>

  <!-- Arms -->
  <path d="M 27 32 Q 18 38 16 45" stroke="#FFD4A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M 37 32 Q 46 38 48 45" stroke="#FFD4A3" stroke-width="4" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="28" y="28" width="8" height="4" fill="#FFD4A3"/>
</svg>
