  <!-- Arms -->
  <path d="M 28 36 Q 22 40 20 46" stroke="#FFD4A3" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 36 36 Q 42 40 44 46" stroke="#FFD4A3" stroke-width="3.5" stroke-linecap="round"/>
</svg>
