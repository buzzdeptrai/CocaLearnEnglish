<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head (smaller, positioned lower for young girl) -->
  <circle cx="32" cy="24" r="8" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>

  <!-- Hair with pigtails -->
  <path d="M 26 20 Q 24 16 26 12 Q 29 10 32 10 Q 35 10 38 12 Q 40 16 38 20" fill="#FF6B6B"/>
  <circle cx="22" cy="20" r="4" fill="#FF6B6B"/>
  <circle cx="42" cy="20" r="4" fill="#FF6B6B"/>

  <!-- Eyes -->
  <circle cx="29" cy="23" r="1.3" fill="#2C3E50"/>
  <circle cx="35" cy="23" r="1.3" fill="#2C3E50"/>

  <!-- Smile -->
  <path d="M 28 26 Q 32 28 36 26" stroke="#E67E22" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <rect x="29" y="31" width="6" height="3" fill="#FFD4A3"/>

  <!-- Dress -->
