<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head -->
  <circle cx="32" cy="20" r="10" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>

  <!-- Gray hair (bun) -->
  <circle cx="32" cy="12" r="6" fill="#B8B8B8"/>
  <path d="M 22 16 Q 20 12 24 10 Q 27 14 28 16" fill="#B8B8B8"/>
  <path d="M 42 16 Q 44 12 40 10 Q 37 14 36 16" fill="#B8B8B8"/>

  <!-- Glasses -->
  <circle cx="27" cy="19" r="3.5" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <circle cx="37" cy="19" r="3.5" fill="none" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="30.5" y1="19" x2="33.5" y2="19" stroke="#2C3E50" stroke-width="1.5"/>

  <!-- Eyes behind glasses -->
  <circle cx="27" cy="19" r="1.2" fill="#2C3E50"/>
  <circle cx="37" cy="19" r="1.2" fill="#2C3E50"/>

  <!-- Smile -->
  <path d="M 27 24 Q 32 26 37 24" stroke="#E67E22" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <rect x="28" y="28" width="8" height="4" fill="#FFD4A3"/>

  <!-- Dress (elderly style) -->
  <path d="M 26 32 L 22 58 L 42 58 L 38 32 Z" fill="#9B59B6" stroke="#7D3C98" stroke-width="1.5"/>

  <!-- Dress pattern (floral) -->
  <circle cx="28" cy="42" r="2" fill="#FFE66D" opacity="0.7"/>
  <circle cx="36" cy="47" r="2" fill="#FFE66D" opacity="0.7"/>
  <circle cx="30" cy="52" r="2" fill="#FFE66D" opacity="0.7"/>

  <!-- Arms -->
  <path d="M 26 34 Q 18 38 16 45" stroke="#FFD4A3" stroke-width="4" stroke-linecap="round"/>
  <path d="M 38 34 Q 46 38 48 45" stroke="#FFD4A3" stroke-width="4" stroke-linecap="round"/>
</svg>
