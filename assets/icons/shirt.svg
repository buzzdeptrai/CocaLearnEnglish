<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shirt body -->
  <path d="M 16 20 L 12 28 L 12 58 L 52 58 L 52 28 L 48 20 L 40 20 L 38 16 L 26 16 L 24 20 Z" fill="#4ECDC4" stroke="#2C7A7B" stroke-width="1.5"/>

  <!-- Left sleeve -->
  <path d="M 12 28 L 4 32 L 6 44 L 12 40 Z" fill="#4ECDC4" stroke="#2C7A7B" stroke-width="1.5"/>

  <!-- Right sleeve -->
  <path d="M 52 28 L 60 32 L 58 44 L 52 40 Z" fill="#4ECDC4" stroke="#2C7A7B" stroke-width="1.5"/>

  <!-- Collar left -->
  <path d="M 24 20 L 20 20 L 26 16 L 28 20 Z" fill="#FFFFFF" stroke="#2C7A7B" stroke-width="1"/>

  <!-- Collar right -->
  <path d="M 40 20 L 44 20 L 38 16 L 36 20 Z" fill="#FFFFFF" stroke="#2C7A7B" stroke-width="1"/>

  <!-- Center line (button placket) -->
  <line x1="32" y1="20" x2="32" y2="58" stroke="#2C7A7B" stroke-width="1.5"/>

  <!-- Buttons -->
  <circle cx="32" cy="26" r="1.5" fill="#FFFFFF" stroke="#2C7A7B" stroke-width="0.5"/>
  <circle cx="32" cy="34" r="1.5" fill="#FFFFFF" stroke="#2C7A7B" stroke-width="0.5"/>
  <circle cx="32" cy="42" r="1.5" fill="#FFFFFF" stroke="#2C7A7B" stroke-width="0.5"/>
  <circle cx="32" cy="50" r="1.5" fill="#FFFFFF" stroke="#2C7A7B" stroke-width="0.5"/>

  <!-- Button holes (decorative) -->
  <line x1="31" y1="26" x2="33" y2="26" stroke="#2C7A7B" stroke-width="0.4"/>
  <line x1="31" y1="34" x2="33" y2="34" stroke="#2C7A7B" stroke-width="0.4"/>
  <line x1="31" y1="42" x2="33" y2="42" stroke="#2C7A7B" stroke-width="0.4"/>
  <line x1="31" y1="50" x2="33" y2="50" stroke="#2C7A7B" stroke-width="0.4"/>

  <!-- Pocket -->
  <rect x="20" y="32" width="8" height="8" rx="1" fill="none" stroke="#2C7A7B" stroke-width="0.8"/>
</svg>
