<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Desktop surface -->
  <rect x="8" y="20" width="48" height="6" rx="2" fill="#8B4513" stroke="#654321" stroke-width="1"/>

  <!-- Desktop top highlight -->
  <rect x="8" y="20" width="48" height="2" rx="1" fill="#A0522D" opacity="0.6"/>

  <!-- Left leg -->
  <rect x="10" y="26" width="4" height="28" rx="1" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>

  <!-- Right leg -->
  <rect x="50" y="26" width="4" height="28" rx="1" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>

  <!-- Drawer -->
  <rect x="28" y="30" width="16" height="8" rx="1" fill="#A0522D" stroke="#654321" stroke-width="0.5"/>

  <!-- Drawer handle -->
  <circle cx="36" cy="34" r="1.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>

  <!-- Book on desk -->
  <rect x="14" y="14" width="10" height="6" rx="0.5" fill="#4ECDC4" stroke="#2C7A7B" stroke-width="0.5"/>
  <line x1="19" y1="14" x2="19" y2="20" stroke="#2C7A7B" stroke-width="0.5"/>

  <!-- Pencil on desk -->
  <rect x="40" y="16" width="1.5" height="8" rx="0.3" fill="#FFE66D" stroke="#D4AF37" stroke-width="0.3" transform="rotate(-30 40.75 20)"/>
  <polygon points="39.5,13 40.75,15 42,13" fill="#FF6B6B"/>
</svg>
