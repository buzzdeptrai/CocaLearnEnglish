<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Table top -->
  <rect x="6" y="22" width="52" height="8" rx="2" fill="#A0522D" stroke="#654321" stroke-width="1"/>

  <!-- Table top highlight -->
  <rect x="6" y="22" width="52" height="3" rx="1" fill="#D2691E" opacity="0.5"/>

  <!-- Table leg front-left -->
  <rect x="10" y="30" width="5" height="26" rx="1.5" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>

  <!-- Table leg front-right -->
  <rect x="49" y="30" width="5" height="26" rx="1.5" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>

  <!-- Table leg back-left (perspective) -->
  <rect x="14" y="30" width="4" height="22" rx="1.5" fill="#6B3410" stroke="#654321" stroke-width="0.5" opacity="0.7"/>

  <!-- Table leg back-right (perspective) -->
  <rect x="46" y="30" width="4" height="22" rx="1.5" fill="#6B3410" stroke="#654321" stroke-width="0.5" opacity="0.7"/>

  <!-- Shadow under table -->
  <ellipse cx="32" cy="56" rx="24" ry="3" fill="#000000" opacity="0.15"/>

  <!-- Decorative items on table -->
  <!-- Apple -->
  <circle cx="20" cy="18" r="3.5" fill="#FF6B6B" stroke="#D63031" stroke-width="0.5"/>
  <rect x="19.5" y="15" width="0.8" height="2" fill="#8B4513"/>
  <path d="M 20 15 Q 22 13 23 15" stroke="#2ECC71" stroke-width="0.8" fill="none"/>

  <!-- Glass of water -->
  <path d="M 42 20 L 43 16 L 47 16 L 48 20 Z" fill="#87CEEB" opacity="0.6" stroke="#4A90A4" stroke-width="0.5"/>
  <ellipse cx="45" cy="20" rx="3" ry="0.8" fill="#87CEEB" opacity="0.8" stroke="#4A90A4" stroke-width="0.3"/>
</svg>
