<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Roof main structure -->
  <path d="M 32 8 L 58 32 L 54 32 L 32 14 L 10 32 L 6 32 Z" fill="#C0392B" stroke="#922B21" stroke-width="1.5"/>

  <!-- Roof tiles/texture -->
  <path d="M 32 14 L 54 32 L 32 32 Z" fill="#E74C3C" opacity="0.6"/>
  <path d="M 32 14 L 10 32 L 32 32 Z" fill="#922B21" opacity="0.3"/>

  <!-- Roof tiles pattern (right side) -->
  <line x1="38" y1="20" x2="50" y2="30" stroke="#922B21" stroke-width="0.8" opacity="0.4"/>
  <line x1="41" y1="22" x2="52" y2="31" stroke="#922B21" stroke-width="0.8" opacity="0.4"/>
  <line x1="44" y1="24" x2="54" y2="32" stroke="#922B21" stroke-width="0.8" opacity="0.4"/>
  <line x1="47" y1="26" x2="56" y2="32" stroke="#922B21" stroke-width="0.8" opacity="0.4"/>

  <!-- Roof tiles pattern (left side) -->
  <line x1="26" y1="20" x2="14" y2="30" stroke="#7A2518" stroke-width="0.8" opacity="0.4"/>
  <line x1="23" y1="22" x2="12" y2="31" stroke="#7A2518" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="24" x2="10" y2="32" stroke="#7A2518" stroke-width="0.8" opacity="0.4"/>
  <line x1="17" y1="26" x2="8" y2="32" stroke="#7A2518" stroke-width="0.8" opacity="0.4"/>

  <!-- Ridge cap (top of roof) -->
  <path d="M 30 10 L 32 8 L 34 10 L 56 30 L 54 32 L 32 14 L 10 32 L 8 30 Z" fill="#922B21" stroke="#7A2518" stroke-width="1"/>

  <!-- Chimney -->
  <rect x="40" y="14" width="8" height="12" rx="1" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  <rect x="39" y="13" width="10" height="2" rx="0.5" fill="#A0522D" stroke="#654321" stroke-width="0.8"/>

  <!-- Chimney smoke -->
  <circle cx="44" cy="8" r="2" fill="#95A5A6" opacity="0.5"/>
  <circle cx="42" cy="6" r="1.5" fill="#95A5A6" opacity="0.4"/>
  <circle cx="46" cy="6" r="1.8" fill="#95A5A6" opacity="0.4"/>

  <!-- House walls (partial, to show context) -->
  <rect x="14" y="32" width="36" height="8" fill="#F39C12" opacity="0.3"/>

  <!-- Window on wall -->
  <rect x="28" y="34" width="8" height="5" rx="0.5" fill="#87CEEB" stroke="#5DADE2" stroke-width="0.5" opacity="0.6"/>
  <line x1="32" y1="34" x2="32" y2="39" stroke="#5DADE2" stroke-width="0.5" opacity="0.8"/>
</svg>
