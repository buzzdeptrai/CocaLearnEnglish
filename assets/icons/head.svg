<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Head/Face circle -->
  <circle cx="32" cy="32" r="22" fill="#FFD4A3" stroke="#E0A370" stroke-width="1.5"/>

  <!-- Hair -->
  <path d="M 32 10 Q 20 10 15 18 Q 12 14 10 20 Q 10 12 18 8 Q 25 6 32 6 Q 39 6 46 8 Q 54 12 54 20 Q 52 14 49 18 Q 44 10 32 10" fill="#8B4513"/>

  <!-- Left eye -->
  <ellipse cx="24" cy="28" rx="3" ry="4" fill="#FFFFFF"/>
  <circle cx="24" cy="28" r="2" fill="#2C3E50"/>
  <circle cx="24.5" cy="27.5" r="0.8" fill="#FFFFFF"/>

  <!-- Right eye -->
  <ellipse cx="40" cy="28" rx="3" ry="4" fill="#FFFFFF"/>
  <circle cx="40" cy="28" r="2" fill="#2C3E50"/>
  <circle cx="40.5" cy="27.5" r="0.8" fill="#FFFFFF"/>

  <!-- Eyebrows -->
  <path d="M 19 22 Q 24 20 29 22" stroke="#6B3410" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M 35 22 Q 40 20 45 22" stroke="#6B3410" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M 32 32 L 30 38 L 34 38" stroke="#E0A370" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Mouth (smile) -->
  <path d="M 24 42 Q 32 46 40 42" stroke="#E67E22" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Ears -->
  <ellipse cx="10" cy="32" rx="4" ry="6" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>
  <ellipse cx="54" cy="32" rx="4" ry="6" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>

  <!-- Inner ears -->
  <ellipse cx="11" cy="32" rx="2" ry="3" fill="#F4A460" opacity="0.5"/>
  <ellipse cx="53" cy="32" rx="2" ry="3" fill="#F4A460" opacity="0.5"/>

  <!-- Neck -->
  <rect x="26" y="52" width="12" height="8" rx="2" fill="#FFD4A3" stroke="#E0A370" stroke-width="1"/>
</svg>
