<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Eraser body (pink part) -->
  <rect x="14" y="24" width="36" height="20" rx="2" fill="#FF6B9D" stroke="#D63384" stroke-width="1.5"/>

  <!-- Eraser top highlight -->
  <rect x="14" y="24" width="36" height="6" rx="2" fill="#FF8DB4" opacity="0.6"/>

  <!-- Eraser side (darker) -->
  <rect x="48" y="26" width="4" height="16" fill="#D63384" opacity="0.4"/>

  <!-- Eraser sleeve wrapper (paper/cardboard) -->
  <rect x="14" y="20" width="36" height="4" rx="1" fill="#FFEAA7" stroke="#DDB76A" stroke-width="1"/>

  <!-- Text on wrapper -->
  <text x="32" y="23" font-family="Arial" font-size="3" fill="#8B7355" text-anchor="middle" font-weight="bold">ERASER</text>

  <!-- Usage marks (eraser wearing down) -->
  <path d="M 20 40 Q 22 42 24 40" stroke="#D63384" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 28 41 Q 30 43 32 41" stroke="#D63384" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 36 40 Q 38 42 40 40" stroke="#D63384" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Eraser crumbs (debris) -->
  <ellipse cx="18" cy="48" rx="2" ry="1" fill="#FF6B9D" opacity="0.6"/>
  <ellipse cx="24" cy="50" rx="1.5" ry="0.8" fill="#FF6B9D" opacity="0.5"/>
  <ellipse cx="30" cy="49" rx="2.5" ry="1.2" fill="#FF6B9D" opacity="0.7"/>

  <!-- Pencil mark being erased (decorative) -->
  <path d="M 48 32 L 58 32" stroke="#636363" stroke-width="2" opacity="0.3" stroke-dasharray="2,1"/>
  <path d="M 50 32 L 56 32" stroke="#636363" stroke-width="2" opacity="0.1" stroke-dasharray="1,1"/>
</svg>
