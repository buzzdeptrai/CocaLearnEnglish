<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Handrail post bottom -->
  <rect x="8" y="48" width="3" height="10" rx="1" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>

  <!-- Handrail post top -->
  <rect x="52" y="8" width="3" height="10" rx="1" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>

  <!-- Handrail -->
  <line x1="9.5" y1="48" x2="53.5" y2="12" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="9.5" y1="48" x2="53.5" y2="12" stroke="#A0522D" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Step 1 (bottom) -->
  <rect x="6" y="52" width="20" height="6" rx="0.5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="6" y="52" width="20" height="2" rx="0.5" fill="#BDC3C7" opacity="0.6"/>

  <!-- Step 2 -->
  <rect x="16" y="43" width="20" height="6" rx="0.5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="16" y="43" width="20" height="2" rx="0.5" fill="#BDC3C7" opacity="0.6"/>

  <!-- Step 3 -->
  <rect x="26" y="34" width="20" height="6" rx="0.5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="26" y="34" width="20" height="2" rx="0.5" fill="#BDC3C7" opacity="0.6"/>

  <!-- Step 4 -->
  <rect x="36" y="25" width="20" height="6" rx="0.5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="36" y="25" width="20" height="2" rx="0.5" fill="#BDC3C7" opacity="0.6"/>

  <!-- Step 5 (top) -->
  <rect x="46" y="16" width="14" height="6" rx="0.5" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="46" y="16" width="14" height="2" rx="0.5" fill="#BDC3C7" opacity="0.6"/>

  <!-- Shadow under stairs -->
  <path d="M 6 58 L 26 58 L 36 49 L 46 40 L 56 31 L 60 22" stroke="#000000" stroke-width="8" opacity="0.1" stroke-linecap="round"/>

  <!-- Handrail supports -->
  <line x1="20" y1="40" x2="22" y2="36" stroke="#8B4513" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="31" x2="32" y2="27" stroke="#8B4513" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="22" x2="42" y2="18" stroke="#8B4513" stroke-width="1.5" opacity="0.5"/>
</svg>
